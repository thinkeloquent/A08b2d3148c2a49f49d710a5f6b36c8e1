[project]
name = "proxy-url-builder"
version = "1.0.0"
description = "Polyglot utility to build authenticated proxy URLs from separate credentials and host"
requires-python = ">=3.11,<3.12"
dependencies = []

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["proxy_url_builder"]

[tool.pytest.ini_options]
testpaths = ["__tests__"]
