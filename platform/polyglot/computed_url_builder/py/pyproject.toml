[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "computed-url-builder"
version = "1.0.0"
description = "A lightweight utility for building integration endpoint URLs with authentication helpers"
license = {text = "ISC"}
requires-python = ">=3.11,<3.12"
authors = [
    {name = "thinkeloquent"}
]
keywords = [
    "url",
    "url-builder",
    "endpoint",
    "integration",
    "fastapi==0.128.0",
    "authentication"
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: ISC License (ISCL)",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Framework :: FastAPI",
    "Topic :: Internet :: WWW/HTTP",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Typing :: Typed"
]

# Zero runtime dependencies for core functionality
dependencies = []

[project.optional-dependencies]
fastapi = [
    "fastapi==0.128.0",
    "httpx[http2]>=0.28.1"
]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
    "httpx[http2]>=0.28.1",
    "fastapi==0.128.0",
    "uvicorn[standard]==0.40.0",
    "ruff>=0.1.0",
    "build>=1.0.0"
]

[project.urls]
Homepage = "https://github.com/thinkeloquent/computed-url-builder"
Repository = "https://github.com/thinkeloquent/computed-url-builder"
Documentation = "https://github.com/thinkeloquent/computed-url-builder#readme"

[tool.hatch.build.targets.wheel]
packages = ["computed_url_builder"]

[tool.pytest.ini_options]
testpaths = ["__tests__"]
python_files = ["test_*.py"]
python_functions = ["test_*"]
asyncio_mode = "auto"
addopts = "-v --tb=short"

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "UP", "B", "C4"]
ignore = ["E501"]
