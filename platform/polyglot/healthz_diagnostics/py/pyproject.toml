[project]
name = "healthz_diagnostics"
version = "0.1.0"
description = "Healthz Diagnostics Polyglot Module"
requires-python = ">=3.11,<3.12"
dependencies = [

]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["healthz_diagnostics"]

[tool.pytest.ini_options]
testpaths = ["healthz_diagnostics/__tests__"]
asyncio_mode = "auto"
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
