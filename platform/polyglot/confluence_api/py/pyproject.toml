[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "confluence-api"
version = "1.0.0"
description = "Confluence Data Center REST API v9.2.3 SDK — polyglot Python package"
license = {text = "MIT"}
requires-python = ">=3.11,<3.12"
dependencies = [
    "fastapi==0.128.0",
    "uvicorn[standard]==0.40.0",
    "httpx[http2]>=0.28.1",
    "pydantic==2.12.5",
    "pydantic-settings==2.12.0",
    "typer[all]>=0.9.0",
    "rich>=13.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0.0",
    "pytest-cov>=4.0.0",
    "pytest-mock>=3.0.0",
    "pytest-asyncio>=0.21.0",
    "ruff>=0.1.0",
    "mypy>=1.5.0",
]

[project.scripts]
confluence-api = "confluence_api.cli:app"

[tool.hatch.build.targets.wheel]
packages = ["src/confluence_api"]

[tool.pytest.ini_options]
testpaths = ["__tests__"]
python_files = ["test_*.py"]
markers = [
    "unit: unit tests",
    "integration: integration tests",
]

[tool.ruff]
target-version = "py311"
line-length = 120
select = ["E", "W", "F", "I", "B", "C4", "UP"]

[tool.mypy]
python_version = "3.11"
strict = true
warn_return_any = true
warn_unused_configs = true
