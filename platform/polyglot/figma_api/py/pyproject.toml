[project]
name = "figma-api"
version = "1.0.0"
description = "Figma API SDK — Polyglot Common Interface (Python)"
requires-python = ">=3.11,<3.12"
dependencies = [
    "fastapi==0.128.0",
    "uvicorn[standard]==0.40.0",
    "pydantic==2.12.5",
    "httpx[http2]>=0.28.1",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
    "respx>=0.20.0",
    "coverage>=7.0.0",
    "pytest-cov>=4.1.0",
    "ruff>=0.1.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["figma_api"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "W", "I"]

[tool.pytest.ini_options]
testpaths = ["__tests__"]
asyncio_mode = "auto"

[tool.coverage.run]
source = ["figma_api"]

[tool.coverage.report]
fail_under = 80
