[project]
name = "rag-embedding-config"
version = "1.0.0"
description = "RAG Embedding Config — constants and kwargs builders (Python)"
requires-python = ">=3.11,<3.12"
dependencies = []

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
    "coverage>=7.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["rag_embedding_config"]

[tool.pytest.ini_options]
testpaths = ["__tests__"]
python_files = "test_*.py"
python_classes = "Test*"
python_functions = "test_*"
asyncio_mode = "auto"
