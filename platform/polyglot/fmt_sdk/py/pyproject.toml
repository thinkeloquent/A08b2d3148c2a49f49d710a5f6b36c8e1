[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "fmt-sdk"
version = "1.0.0"
description = "Polyglot Formatter SDK — unified format(request) -> result interface"
license = {text = "MIT"}
requires-python = ">=3.11,<3.12"
dependencies = [
    "pydantic==2.12.5",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0.0",
    "pytest-cov>=4.0.0",
    "ruff>=0.1.0",
]

[tool.hatch.build.targets.wheel]
packages = ["fmt_sdk"]

[tool.pytest.ini_options]
testpaths = ["__tests__"]
python_files = ["test_*.py"]

[tool.ruff]
target-version = "py311"
line-length = 120
select = ["E", "W", "F", "I", "B", "C4", "UP"]
