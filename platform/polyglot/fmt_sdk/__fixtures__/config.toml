[formatter.go]
command = "gofmt"
args = ["-w"]
extensions = [".go"]
includes = ["**/*.go"]
excludes = ["vendor/**"]

[formatter.python]
command = "ruff"
args = ["format", "--check"]
extensions = [".py"]
includes = ["**/*.py"]
excludes = ["__pycache__/**", ".venv/**"]

[formatter.node]
command = "biome"
args = ["format", "--write"]
extensions = [".js", ".ts", ".mjs", ".mts"]
includes = ["src/**"]
excludes = ["node_modules/**", "dist/**"]

[formatter.rust]
command = "rustfmt"
args = ["--edition", "2021"]
extensions = [".rs"]
includes = ["src/**/*.rs"]
excludes = ["target/**"]
