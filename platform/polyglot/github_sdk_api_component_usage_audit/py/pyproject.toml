[project]
name = "github-sdk-api-component-usage-audit"
version = "0.1.0"
description = "Audit real-world usage of a React UI component across public GitHub repositories"
requires-python = ">=3.11,<3.12"
dependencies = [
    "fastapi==0.128.0",
    "pydantic==2.12.5",
    "fetch_httpx",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
    "respx>=0.20.0",
    "coverage>=7.0.0",
]

[project.scripts]
github-component-audit = "github_sdk_api_component_usage_audit.main:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["github_sdk_api_component_usage_audit"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["__tests__"]
