[project]
name = "rag-llm-synthesis"
version = "1.0.0"
description = "RAG LLM Synthesis — Multi-provider LLM answer synthesis with structured output (Python)"
requires-python = ">=3.11,<3.12"
dependencies = []

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
    "coverage>=7.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["rag_llm_synthesis"]

[tool.pytest.ini_options]
testpaths = ["__tests__"]
python_files = "test_*.py"
python_classes = "Test*"
python_functions = "test_*"
asyncio_mode = "auto"
