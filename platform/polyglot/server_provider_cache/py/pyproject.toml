[project]
name = "server_provider_cache"
version = "0.1.0"
description = "Server Provider Cache - Multi-Instance Factory for Polyglot Applications"
requires-python = ">=3.11,<3.12"
dependencies = [

]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["server_provider_cache"]

[tool.pytest.ini_options]
testpaths = ["server_provider_cache/__tests__"]
asyncio_mode = "auto"
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
