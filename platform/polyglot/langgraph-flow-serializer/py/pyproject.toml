[project]
name = "langgraph-flow-serializer"
version = "1.0.0"
description = "Polyglot serializer for LangChain/LangGraph flow graphs"
requires-python = ">=3.11,<3.12"
dependencies = [
    "pydantic==2.12.5",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
    "coverage>=7.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["langgraph_flow_serializer"]

[tool.pytest.ini_options]
testpaths = ["__tests__"]
python_files = "test_*.py"
python_classes = "Test*"
python_functions = "test_*"
asyncio_mode = "auto"
