[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "extract_imports_text_based_notation"
version = "1.0.0"
description = "Extract import/export declarations from Python source code into text-based notation"
requires-python = ">=3.11,<3.12"
license = { text = "MIT" }

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24",
    "ruff>=0.8",
]

[project.scripts]
extract-imports = "extract_imports_text_based_notation.__main__:main"

[tool.hatch.build.targets.wheel]
packages = ["extract_imports_text_based_notation"]

[tool.pytest.ini_options]
testpaths = ["__tests__"]

[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "UP"]
