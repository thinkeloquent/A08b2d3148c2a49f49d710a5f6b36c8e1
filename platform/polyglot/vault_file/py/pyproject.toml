[project]
name = "vault-file"
version = "1.0.0"
description = "Polyglot Vault File and EnvStore for Python"
requires-python = ">=3.11,<3.12"
dependencies = [
    "python-dotenv==1.2.1",
    "pyyaml==6.0.3",
    "pydantic==2.12.5",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/vault_file"]

[tool.pytest.ini_options]
testpaths = ["tests", "__tests__"]
pythonpath = ["src"]
asyncio_mode = "auto"
