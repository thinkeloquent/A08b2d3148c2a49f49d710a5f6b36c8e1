[project]
name = "rag-ui-component-ingest-config"
version = "1.0.0"
description = "RAG UI Component Ingest Config — Polyglot Common Interface (Python)"
requires-python = ">=3.11,<3.12"
dependencies = [
    "pydantic==2.12.5",
    "pyyaml==6.0.3",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
    "coverage>=7.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["rag_ui_component_ingest_config"]

[tool.pytest.ini_options]
testpaths = ["__tests__"]
python_files = "test_*.py"
python_classes = "Test*"
python_functions = "test_*"
asyncio_mode = "auto"
