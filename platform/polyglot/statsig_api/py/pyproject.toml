[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "statsig-api-client"
version = "1.0.0"
description = "Async Python client for the Statsig Console API"
requires-python = ">=3.11,<3.12"
dependencies = ["httpx>=0.27"]

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-asyncio>=0.23", "pytest-httpx>=0.30", "fastapi>=0.115", "httpx>=0.27"]

[tool.hatch.build.targets.wheel]
packages = ["statsig_client"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
