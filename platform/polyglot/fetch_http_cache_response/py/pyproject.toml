[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "fetch_http_cache_response"
version = "1.0.0"
description = "Polyglot HTTP client with S3 response caching, auth token rotation, and three-tier config resolution"
requires-python = ">=3.11,<3.12"
authors = [{ name = "MTA Team" }]
keywords = ["http", "cache", "s3", "fetch", "polyglot"]

dependencies = [
    "fetch_httpx>=1.0.0",
    "cache_json_awss3_storage>=1.0.0",
    "auth_config>=0.1.0",
    "auth_encoding>=1.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0.0",
    "pytest-asyncio>=0.21.0",
    "moto[s3]>=4.0.0",
    "mypy>=1.0.0",
    "ruff>=0.1.0",
]
fastapi = [
    "fastapi==0.128.0",
    "uvicorn[standard]==0.40.0",
]

[tool.hatch.build.targets.wheel]
packages = ["fetch_http_cache_response"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["fetch_http_cache_response/tests", "__tests__"]
markers = [
    "integration: marks tests as integration tests",
]

[tool.mypy]
python_version = "3.11"
strict = true
warn_return_any = true
warn_unused_ignores = true

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP", "B", "C4", "SIM"]
ignore = ["E501"]
