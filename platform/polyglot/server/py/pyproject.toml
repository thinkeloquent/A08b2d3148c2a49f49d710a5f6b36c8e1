[project]
name = "polyglot-server"
version = "0.1.0"
description = "Polyglot Server Scaffolding (Python)"
requires-python = ">=3.11,<3.12"
dependencies = [
    "fastapi==0.128.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["polyglot_server"]

[tool.pytest.ini_options]
testpaths = ["__tests__"]
pythonpath = ["app"]
asyncio_mode = "auto"
