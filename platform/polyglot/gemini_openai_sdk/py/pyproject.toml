[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "gemini_openai_sdk"
version = "0.1.0"
description = "Polyglot SDK for Gemini OpenAI-compatible API"
license = {text = "MIT"}
requires-python = ">=3.11,<3.12"
authors = [
    {name = "MTA Team"}
]
keywords = ["gemini", "openai", "llm", "sdk", "api"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries :: Python Modules",
]

dependencies = [
    "httpx[http2]>=0.28.1",
    "fastapi==0.128.0",
    "uvicorn[standard]==0.40.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.4.0",
    "pytest-asyncio>=0.21.0",
    "pytest-httpx>=0.30.0",
    "pytest-cov>=4.1.0",
    "ruff>=0.1.0",
]

[project.scripts]
gemini-openai = "gemini_openai_sdk.cli:main"

[project.urls]
Homepage = "https://github.com/mta/gemini-openai-sdk"

[tool.hatch.build.targets.wheel]
packages = ["gemini_openai_sdk"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "W", "I"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["__tests__"]
pythonpath = ["."]
