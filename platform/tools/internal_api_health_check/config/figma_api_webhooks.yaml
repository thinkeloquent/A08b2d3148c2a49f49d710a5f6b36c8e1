name: figma_api_webhooks
description: Webhook management endpoints (v2 API)

tests:
  - id: get-webhook
    description: Get a specific webhook
    path: /v2/webhooks/:webhook_id
    expected_status: [200, 403, 404, 429]

  - id: list-team-webhooks
    description: List webhooks for a team
    path: /v2/teams/:team_id/webhooks
    expected_status: [200, 403, 404, 429]

  - id: get-webhook-requests
    description: List requests for a webhook
    path: /v2/webhooks/:webhook_id/requests
    expected_status: [200, 403, 404, 429]
