# OpenAPI LLM-Friendly Endpoint Registry
#
# Controls which endpoints are surfaced at /openapi/llm
# Both Fastify and FastAPI servers read this file to render
# a simplified, LLM-consumable endpoint table.
#
# Base URL is derived at runtime from the request object (supports cloud/microservice deployments).
# Endpoints section: each entry has path, method, name, server, and optional description.

endpoints:
  # ── Runtime App Config ──────────────────────────────────────────────
  - path: /api/runtime-app-config/endpoints
    method: GET
    name: get_all_endpoints
    server: both
  - path: /api/runtime-app-config/endpoints/refresh
    method: POST
    name: refresh_endpoint_config
    server: both
  - path: /api/runtime-app-config/endpoints/by-name/{name}
    method: GET
    name: get_endpoint_by_friendly_name
    server: both
  - path: /api/runtime-app-config/endpoints/by-tag/{tag}
    method: GET
    name: get_endpoints_by_tag
    server: both
  - path: /api/runtime-app-config/endpoints/{name}
    method: GET
    name: get_endpoint_by_name
    server: both
  - path: /api/runtime-app-config/intent-mapping
    method: GET
    name: get_intent_mapping
    server: both
  - path: /api/runtime-app-config/resolve-intent/{intent}
    method: GET
    name: resolve_intent
    server: both
  - path: /api/runtime-app-config/origins
    method: GET
    name: get_origins
    server: both

  # ── Async Example ───────────────────────────────────────────────────
  - path: /async-example
    method: GET
    name: async_example
    server: fastapi

  # ── CSP Report ──────────────────────────────────────────────────────
  - path: /api/csp-report
    method: POST
    name: csp_report
    server: both

  # ── LLM Gemini OpenAI v1 ───────────────────────────────────────────
  - path: /api/llm/gemini-openai-v1/health
    method: GET
    name: llm_health
    server: both
    description: SDK health check — returns connectivity and model availability status
    tag: llm
  - path: /api/llm/gemini-openai-v1/chat
    method: POST
    name: llm_chat
    server: both
    description: Chat completion using Gemini via OpenAI-compatible API
    tag: llm
  - path: /api/llm/gemini-openai-v1/stream
    method: POST
    name: llm_stream
    server: both
    description: SSE streaming chat completion — returns Server-Sent Events
    tag: llm
  - path: /api/llm/gemini-openai-v1/structure
    method: POST
    name: llm_structure
    server: both
    description: Structured JSON output — extracts data matching a provided JSON schema
    tag: llm
  - path: /api/llm/gemini-openai-v1/tool-call
    method: POST
    name: llm_tool_call
    server: both
    description: Function calling — invokes tools based on prompt analysis
    tag: llm
  - path: /api/llm/gemini-openai-v1/json
    method: POST
    name: llm_json_mode
    server: both
    description: JSON mode — returns LLM response as valid JSON
    tag: llm
  - path: /api/llm/gemini-openai-v1/conversation
    method: POST
    name: llm_conversation
    server: both
    description: Multi-turn conversation with message history
    tag: llm

  # ── LLM Gemini OpenAI v1 Router ────────────────────────────────────
  - path: /api/llm/gemini-openai-v1-router/health
