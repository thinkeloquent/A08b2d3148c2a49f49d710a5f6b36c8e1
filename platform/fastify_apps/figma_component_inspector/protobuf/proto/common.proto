syntax = "proto3";
package figma_component_inspector;

message Timestamp {
  int64 seconds = 1;
  int32 nanos = 2;
}

message PaginationRequest {
  int32 page = 1;
  int32 page_size = 2;
}

message PaginationResponse {
  int32 total = 1;
  int32 page = 2;
  int32 page_size = 3;
  int32 total_pages = 4;
}
