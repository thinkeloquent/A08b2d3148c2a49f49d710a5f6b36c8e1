syntax = "proto3";

package prompt_management_system;

message Project {
  string id = 1;
  string name = 2;
  string description = 3;
  string status = 4;
  string created_by = 5;
  string updated_by = 6;
  string created_at = 7;
  string updated_at = 8;
  string metadata = 9; // JSON string
  repeated Prompt prompts = 10;
}

message Prompt {
  string id = 1;
  string project_id = 2;
  string slug = 3;
  string name = 4;
  string description = 5;
  string status = 6;
  string created_by = 7;
  string updated_by = 8;
  string created_at = 9;
  string updated_at = 10;
  string metadata = 11; // JSON string
  repeated PromptVersion versions = 12;
  repeated Deployment deployments = 13;
}

message PromptVersion {
  string id = 1;
  string prompt_id = 2;
  int32 version_number = 3;
  string template = 4;
  string config = 5; // JSON string
  string input_schema = 6; // JSON string
  string commit_message = 7;
  string status = 8;
  string created_by = 9;
  string created_at = 10;
  string metadata = 11; // JSON string
  repeated Variable variables = 12;
}

message Deployment {
  string id = 1;
  string prompt_id = 2;
  string environment = 3;
  string version_id = 4;
  string deployed_by = 5;
  string created_at = 6;
  string updated_at = 7;
  string metadata = 8; // JSON string
  PromptVersion version = 9;
}

message Variable {
  string id = 1;
  string version_id = 2;
  string key = 3;
  string type = 4;
  string description = 5;
  string default_value = 6;
  bool required = 7;
  string created_at = 8;
}

message ProjectList {
  repeated Project data = 1;
  Pagination pagination = 2;
}

message PromptList {
  repeated Prompt data = 1;
  Pagination pagination = 2;
}

message VersionList {
  repeated PromptVersion data = 1;
  Pagination pagination = 2;
}

message Pagination {
  int32 page = 1;
  int32 limit = 2;
  int32 total = 3;
  int32 total_pages = 4;
}

message RenderRequest {
  string environment = 1;
  map<string, string> variables = 2;
}

message RenderResponse {
  string rendered = 1;
  string config = 2; // JSON string
  PromptVersion version = 3;
  Prompt prompt = 4;
}
