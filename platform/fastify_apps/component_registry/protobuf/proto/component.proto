syntax = "proto3";
package component_registry;

import "common.proto";
import "tag.proto";

message Component {
  string id = 1;
  string name = 2;
  ComponentCategory category = 3;
  string version = 4;
  string author = 5;
  int32 downloads = 6;
  int32 stars = 7;
  ComponentStatus status = 8;
  string description = 9;
  repeated Tag tags = 10;
  string created_at = 11;
  string updated_at = 12;
}

message CreateComponentRequest {
  string name = 1;
  ComponentCategory category = 2;
  string version = 3;
  string author = 4;
  ComponentStatus status = 5;
  string description = 6;
  repeated string tag_ids = 7;
}

message UpdateComponentRequest {
  string id = 1;
  string name = 2;
  ComponentCategory category = 3;
  string version = 4;
  string author = 5;
  ComponentStatus status = 6;
  string description = 7;
  repeated string tag_ids = 8;
}

message ListComponentsRequest {
  PaginationRequest pagination = 1;
  string search = 2;
  ComponentStatus status = 3;
  ComponentCategory category = 4;
  string author = 5;
  string sort = 6;
  string order = 7;
}

message ListComponentsResponse {
  repeated Component components = 1;
  PaginationResponse pagination = 2;
}

message ComponentStatsResponse {
  int32 total_components = 1;
  int64 total_downloads = 2;
  int32 active_publishers = 3;
}
