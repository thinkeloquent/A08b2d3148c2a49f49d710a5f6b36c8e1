syntax = "proto3";

package fqdp;

import "common.proto";

message Application {
  string id = 1;
  string name = 2;
  string slug = 3;
  string description = 4;
  EntityStatus status = 5;
  string metadata_json = 6;
  string team_id = 7;
  string team_name = 8;
  string workspace_id = 9;
  string workspace_name = 10;
  string organization_id = 11;
  string organization_name = 12;
  int32 project_count = 13;
  string created_by = 14;
  string updated_by = 15;
  string created_at = 16;
  string updated_at = 17;
}

message ApplicationList {
  repeated Application data = 1;
  PaginationMeta meta = 2;
}

message CreateApplicationRequest {
  string name = 1;
  reserved 2;
  string description = 3;
  string team_id = 4;
  string metadata_json = 5;
}

message UpdateApplicationRequest {
  string name = 1;
  reserved 2;
  string description = 3;
  EntityStatus status = 4;
  string metadata_json = 5;
}
