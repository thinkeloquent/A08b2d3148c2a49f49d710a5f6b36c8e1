syntax = "proto3";

package fqdp;

enum EntityStatus {
  ENTITY_STATUS_UNSPECIFIED = 0;
  ACTIVE = 1;
  INACTIVE = 2;
  ARCHIVED = 3;
}

enum ResourceType {
  RESOURCE_TYPE_UNSPECIFIED = 0;
  FIGMA = 1;
  SKETCH = 2;
  XD = 3;
  PDF = 4;
  IMAGE = 5;
  CODE = 6;
  DOCUMENT = 7;
  OTHER = 8;
}

enum ReferenceType {
  REFERENCE_TYPE_UNSPECIFIED = 0;
  SERVICE = 1;
  PAGE = 2;
  COMPONENT = 3;
  REPOSITORY = 4;
}

message Metadata {
  string key = 1;
  string value = 2;
}

message PaginationMeta {
  int32 total = 1;
  int32 page = 2;
  int32 limit = 3;
  int32 total_pages = 4;
}
