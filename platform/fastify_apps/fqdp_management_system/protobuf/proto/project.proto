syntax = "proto3";

package fqdp;

import "common.proto";

message Project {
  string id = 1;
  string name = 2;
  string slug = 3;
  string description = 4;
  EntityStatus status = 5;
  string metadata_json = 6;
  string application_id = 7;
  string application_name = 8;
  string team_id = 9;
  string team_name = 10;
  string workspace_id = 11;
  string workspace_name = 12;
  string organization_id = 13;
  string organization_name = 14;
  int32 resource_count = 15;
  string created_by = 16;
  string updated_by = 17;
  string created_at = 18;
  string updated_at = 19;
}

message ProjectList {
  repeated Project data = 1;
  PaginationMeta meta = 2;
}

message CreateProjectRequest {
  string name = 1;
  reserved 2;
  string description = 3;
  string application_id = 4;
  string metadata_json = 5;
}

message UpdateProjectRequest {
  string name = 1;
  reserved 2;
  string description = 3;
  EntityStatus status = 4;
  string metadata_json = 5;
}
